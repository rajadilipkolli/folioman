name: Nuxt Build CI

on:
  push:
    paths:
      - "ui/**"
    branches: [ main ]
  pull_request:
    paths:
      - "ui/**"
    types:
      - opened
      - synchronize
      - reopened

jobs:
  build:
    name: Run Unit & Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "./ui"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'yarn'
          cache-dependency-path: ui/yarn.lock
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Start Backend Services
        run: |
          cd ..
          docker compose up -d timedb cache api
          # Wait for API to be ready
          echo "Waiting for API..."
          for i in {1..30}; do
            if docker compose logs api | grep -q "Listening at: http://0.0.0.0:8000"; then
              echo "API is ready!"
              break
            fi
            echo -n "."
            sleep 2
          done
          # Create E2E test user
          docker compose exec -T api /venv/bin/python manage.py shell -c "from django.contrib.auth.models import User; User.objects.filter(username='testuser').exists() or User.objects.create_user('testuser', 'test@example.com', 'password123')"
      - name: Start UI Development Server
        run: |
          yarn dev &
          # Wait for UI to be ready
          echo "Waiting for UI..."
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "UI is ready!"
              break
            fi
            sleep 2
          done
      - name: Run E2E Tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ui/playwright-report/
          retention-days: 30
